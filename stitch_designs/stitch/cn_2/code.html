<body class="bg-background font-body text-on-surface selection:bg-primary-container selection:text-on-primary-container overflow-x-hidden">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 w-full z-50 bg-[#f7f9fb]/80 dark:bg-slate-900/80 backdrop-blur-md shadow-sm shadow-[#2a3439]/5 flex items-center justify-between px-6 h-16">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#466178]" data-icon="bubble_chart">bubble_chart</span>
<h1 class="font-['Manrope'] font-bold tracking-tighter text-[#466178] text-lg">WeBreak 破冰</h1>
</div>
<button class="material-symbols-outlined text-[#466178]/60 hover:opacity-80 transition-opacity active:scale-95" data-icon="close">close</button>
</header>
<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto">
<!-- Hero Header Section -->
<section class="mb-12">
<h2 class="text-3xl font-headline font-semibold text-primary tracking-tight mb-4">建立你的第一印象</h2>
<p class="text-on-surface-variant leading-relaxed opacity-80">通过几个简单的偏好，让初次聊天不再尴尬。你的破冰卡片将以最优雅的方式呈现。</p>
</section>
<!-- Generation Form - Editorial Layout -->
<div class="space-y-12">
<!-- Question 1: Simple Input -->
<div class="space-y-4">
<label class="block text-label font-bold text-on-surface/70 tracking-widest uppercase text-xs">01 身份</label>
<div class="text-xl font-headline font-medium text-primary mb-2">别人怎么称呼你</div>
<input class="w-full bg-surface-container-low border-none rounded-xl px-6 py-4 text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary-container focus:bg-surface-container-lowest transition-all duration-300" placeholder="例如：阿乐、小王..." type="text"/>
</div>
<!-- Question 2: Chips Selection -->
<div class="space-y-4">
<label class="block text-label font-bold text-on-surface/70 tracking-widest uppercase text-xs">02 沟通</label>
<div class="text-xl font-headline font-medium text-primary mb-2">聊天风格</div>
<div class="flex flex-wrap gap-3">
<button class="px-6 py-3 rounded-full bg-primary-container text-on-primary-container font-medium active:scale-95 transition-all">随缘</button>
<button class="px-6 py-3 rounded-full bg-surface-container-high text-on-surface-variant hover:bg-surface-container-highest active:scale-95 transition-all">话痨</button>
<button class="px-6 py-3 rounded-full bg-surface-container-high text-on-surface-variant hover:bg-surface-container-highest active:scale-95 transition-all">言简意赅</button>
<button class="px-6 py-3 rounded-full bg-surface-container-high text-on-surface-variant hover:bg-surface-container-highest active:scale-95 transition-all">表情包大户</button>
</div>
</div>
<!-- Question 3: Chips Selection -->
<div class="space-y-4">
<label class="block text-label font-bold text-on-surface/70 tracking-widest uppercase text-xs">03 速度</label>
<div class="text-xl font-headline font-medium text-primary mb-2">回复节奏</div>
<div class="flex flex-wrap gap-3">
<button class="px-6 py-3 rounded-full bg-surface-container-high text-on-surface-variant hover:bg-surface-container-highest active:scale-95 transition-all">秒回</button>
<button class="px-6 py-3 rounded-full bg-primary-container text-on-primary-container font-medium active:scale-95 transition-all">忙完回</button>
<button class="px-6 py-3 rounded-full bg-surface-container-high text-on-surface-variant hover:bg-surface-container-highest active:scale-95 transition-all">意念回复</button>
<button class="px-6 py-3 rounded-full bg-surface-container-high text-on-surface-variant hover:bg-surface-container-highest active:scale-95 transition-all">看心情</button>
</div>
</div>
<!-- Question 4: Chips Selection -->
<div class="space-y-4">
<label class="block text-label font-bold text-on-surface/70 tracking-widest uppercase text-xs">04 偏好</label>
<div class="text-xl font-headline font-medium text-primary mb-2">相处偏好</div>
<div class="flex flex-wrap gap-3">
<button class="px-6 py-3 rounded-full bg-surface-container-high text-on-surface-variant hover:bg-surface-container-highest active:scale-95 transition-all">自来熟</button>
<button class="px-6 py-3 rounded-full bg-surface-container-high text-on-surface-variant hover:bg-surface-container-highest active:scale-95 transition-all">慢热</button>
<button class="px-6 py-3 rounded-full bg-primary-container text-on-primary-container font-medium active:scale-95 transition-all">保持边界</button>
<button class="px-6 py-3 rounded-full bg-surface-container-high text-on-surface-variant hover:bg-surface-container-highest active:scale-95 transition-all">直球型</button>
</div>
</div>
<!-- Question 5: Simple Input -->
<div class="space-y-4">
<label class="block text-label font-bold text-on-surface/70 tracking-widest uppercase text-xs">05 备注</label>
<div class="text-xl font-headline font-medium text-primary mb-2">一句备注</div>
<div class="icebreaker-bubble p-6 shadow-sm">
<textarea class="w-full bg-transparent border-none p-0 text-on-surface placeholder:text-outline-variant focus:ring-0 resize-none text-lg leading-relaxed" placeholder="给对方的一句话，或者你的特别属性..." rows="3"></textarea>
</div>
</div>
</div>
<!-- Visual Decorative Element -->
<div class="mt-20 flex justify-center opacity-40">
<div class="w-16 h-1 bg-surface-container-highest rounded-full"></div>
</div>
</main>
<!-- Bottom Action Area -->
<footer class="fixed bottom-0 left-0 w-full px-6 pb-10 pt-6 bg-surface/80 backdrop-blur-md">
<div class="max-w-2xl mx-auto">
<button class="w-full h-14 bg-primary text-on-primary font-headline font-semibold text-lg rounded-xl shadow-lg shadow-primary/10 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<span>生成破冰卡</span>
<span class="material-symbols-outlined text-xl" data-icon="auto_awesome">auto_awesome</span>
</button>
</div>
</footer>
