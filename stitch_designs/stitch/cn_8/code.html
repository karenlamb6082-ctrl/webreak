        .glass-effect {
            background: rgba(255, 255, 255, 0.8);

<body class="bg-background font-body text-on-background min-h-screen flex flex-col">
<!-- TopAppBar (Based on Shared Components JSON) -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-[#f7f9fb] dark:bg-slate-900 transition-colors duration-200">
<button class="text-[#3d637e] dark:text-[#b3d9f9] hover:bg-slate-200/50 dark:hover:bg-slate-800/50 transition-colors p-2 rounded-full active:scale-95 duration-200 ease-out-quint">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="text-[#3d637e] dark:text-[#b3d9f9] font-['Plus_Jakarta_Sans'] font-bold text-lg tracking-tight">WeBreak 破冰卡</h1>
<div class="w-10"></div> <!-- Spacer for center alignment -->
</header>
<!-- Main Content: The Poster Area -->
<main class="flex-1 pt-24 pb-32 px-6 max-w-2xl mx-auto w-full flex flex-col items-center">
<!-- The Icebreaker Card (Editorial Poster) -->
<div class="w-full bg-surface-container-lowest rounded-xl p-8 card-shadow flex flex-col gap-10 relative overflow-hidden">
<!-- Subtle background texture/gradient -->
<div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(circle at 20% 20%, #b3d9f9 0%, transparent 40%), radial-gradient(circle at 80% 80%, #cbcefe 0%, transparent 40%);"></div>
<!-- Header Info -->
<div class="relative z-10 flex flex-col items-center text-center">
<span class="font-label text-xs uppercase tracking-[0.2em] text-outline mb-4">Connection Card</span>
<h2 class="font-headline font-extrabold text-5xl text-primary tracking-tighter mb-4">林深见鹿</h2>
<div class="inline-flex items-center px-6 py-2 bg-primary-container text-on-primary-container rounded-full font-headline font-bold text-lg">
                    INFJ
                </div>
</div>
<!-- Visual Decorative Divider -->
<div class="h-px w-full bg-outline-variant opacity-20"></div>
<!-- Tags Section -->
<div class="relative z-10 flex flex-wrap justify-center gap-3">
<span class="px-5 py-2.5 bg-surface-container text-on-surface-variant rounded-full text-sm font-medium"># 深度对话爱好者</span>
<span class="px-5 py-2.5 bg-surface-container text-on-surface-variant rounded-full text-sm font-medium"># 咖啡因依赖</span>
<span class="px-5 py-2.5 bg-surface-container text-on-surface-variant rounded-full text-sm font-medium"># 极简主义</span>
<span class="px-5 py-2.5 bg-surface-container text-on-surface-variant rounded-full text-sm font-medium"># 晚期猫奴</span>
</div>
<!-- Quote/Remark Section -->
<div class="relative z-10 mt-4 flex flex-col items-center">
<div class="w-8 h-8 mb-4 text-primary-container">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">format_quote</span>
</div>
<p class="font-headline text-2xl text-on-surface leading-relaxed text-center font-medium max-w-[85%]">
                    “在这个喧嚣的世界里，我更倾向于在安静的角落里，听见你灵魂的声音。”
                </p>
<div class="mt-8 flex items-center gap-3">
<div class="w-10 h-px bg-outline-variant opacity-40"></div>
<span class="font-label text-[10px] text-outline tracking-widest uppercase">Thoughtful Mind</span>
<div class="w-10 h-px bg-outline-variant opacity-40"></div>
</div>
</div>
<!-- Branding Footer on Card -->
<div class="mt-6 flex justify-between items-center opacity-40 grayscale">
<span class="text-[10px] font-headline font-bold tracking-tight">WEBREAK IDENTITY</span>
<div class="flex gap-1">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-primary-container"></div>
</div>
</div>
</div>

<div class="mt-12 w-full flex flex-col gap-4">
<!-- Large Primary Button -->
<button class="w-full h-14 bg-gradient-to-r from-primary to-primary-dim text-on-primary rounded-full font-headline font-bold text-lg flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined">download</span>
                保存破冰卡到相册
            </button>
<!-- Row of Secondary Buttons -->
<div class="grid grid-cols-2 gap-4">
<button class="h-12 border border-outline-variant/30 text-primary font-body font-semibold rounded-full flex items-center justify-center gap-2 hover:bg-surface-container-low active:scale-95 transition-all">
<span class="material-symbols-outlined text-xl">refresh</span>
                    换一句备注
                </button>
<button class="h-12 border border-outline-variant/30 text-secondary font-body font-semibold rounded-full flex items-center justify-center gap-2 hover:bg-surface-container-low active:scale-95 transition-all">
<span class="material-symbols-outlined text-xl">edit</span>
                    返回修改
                </button>

<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-[0px_-10px_30px_rgba(61,99,126,0.05)] rounded-t-[2rem]">

<span class="material-symbols-outlined">person</span>
