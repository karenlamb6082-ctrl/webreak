<!DOCTYPE html>

<html lang="en"><head>

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            -webkit-tap-highlight-color: transparent;
        }

    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col items-center">
<!-- Top Navigation Anchor (Manual Mapping from JSON: Back Arrow + Logo) -->
<header class="w-full sticky top-0 bg-[#f7f9fb] dark:bg-slate-900 z-40">
<div class="flex items-center justify-between px-6 py-4 w-full max-w-md mx-auto">
<button class="text-[#466178] dark:text-[#cbe6ff] scale-95 active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined">arrow_back_ios</span>
</button>
<h1 class="font-manrope font-semibold text-[#466178] dark:text-[#cbe6ff] text-lg tracking-tight">Icebreaker</h1>
<div class="w-6"></div> <!-- Spacer for centering -->
</div>
</header>
<main class="w-full max-w-md px-6 pt-12 pb-32 flex flex-col gap-12">
<!-- Intro Header -->
<section class="space-y-2">
<h2 class="text-3xl font-semibold text-on-surface tracking-tight leading-tight">Create your icebreaker card.</h2>
<p class="text-on-surface-variant text-lg leading-relaxed opacity-80">Set the tone for your future conversations.</p>
</section>
<!-- Form Area -->
<form class="flex flex-col gap-10">
<!-- Name Input Field -->
<div class="space-y-4">
<label class="block text-[11px] font-bold uppercase tracking-[0.1em] text-on-surface-variant ml-1">Your Name</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-lg px-6 py-5 text-lg font-medium placeholder:text-outline-variant focus:ring-2 focus:ring-primary-container focus:bg-surface-container-lowest transition-all duration-300 outline-none" placeholder="e.g. Alex Chen" type="text"/>
</div>
</div>
<!-- Chat Style Selection -->
<div class="space-y-4">
<label class="block text-[11px] font-bold uppercase tracking-[0.1em] text-on-surface-variant ml-1">Chat Style</label>
<div class="flex flex-wrap gap-3">
<button class="px-5 py-3 rounded-full bg-primary-container text-on-primary-container font-medium transition-all duration-200 scale-98 active:scale-95" type="button">Casual &amp; Witty</button>
<button class="px-5 py-3 rounded-full bg-surface-container-high text-on-surface-variant font-medium hover:bg-slate-100 transition-all duration-200" type="button">Deep &amp; Meaningful</button>
<button class="px-5 py-3 rounded-full bg-surface-container-high text-on-surface-variant font-medium hover:bg-slate-100 transition-all duration-200" type="button">Short &amp; Sweet</button>
</div>
</div>
<!-- Response Pace Selection -->
<div class="space-y-4">
<label class="block text-[11px] font-bold uppercase tracking-[0.1em] text-on-surface-variant ml-1">Response Pace</label>
<div class="flex flex-wrap gap-3">
<button class="px-5 py-3 rounded-full bg-surface-container-high text-on-surface-variant font-medium hover:bg-slate-100 transition-all duration-200" type="button">Instant Reply</button>
<button class="px-5 py-3 rounded-full bg-primary-container text-on-primary-container font-medium transition-all duration-200 scale-98 active:scale-95" type="button">Mindful Gaps</button>
<button class="px-5 py-3 rounded-full bg-surface-container-high text-on-surface-variant font-medium hover:bg-slate-100 transition-all duration-200" type="button">Batch Texter</button>
</div>
</div>
<!-- Vibe Preference Selection -->
<div class="space-y-4">
<label class="block text-[11px] font-bold uppercase tracking-[0.1em] text-on-surface-variant ml-1">Vibe Preference</label>
<div class="flex flex-wrap gap-3">
<button class="px-5 py-3 rounded-full bg-surface-container-high text-on-surface-variant font-medium hover:bg-slate-100 transition-all duration-200" type="button">Playful</button>
<button class="px-5 py-3 rounded-full bg-surface-container-high text-on-surface-variant font-medium hover:bg-slate-100 transition-all duration-200" type="button">Calm</button>
<button class="px-5 py-3 rounded-full bg-primary-container text-on-primary-container font-medium transition-all duration-200 scale-98 active:scale-95" type="button">Energetic</button>
<button class="px-5 py-3 rounded-full bg-surface-container-high text-on-surface-variant font-medium hover:bg-slate-100 transition-all duration-200" type="button">Sincere</button>
</div>
</div>
<!-- One Remark Textarea -->
<div class="space-y-4">
<label class="block text-[11px] font-bold uppercase tracking-[0.1em] text-on-surface-variant ml-1">One Remark</label>
<div class="relative">
<textarea class="w-full bg-surface-container-low border-none rounded-lg px-6 py-5 text-lg font-medium placeholder:text-outline-variant focus:ring-2 focus:ring-primary-container focus:bg-surface-container-lowest transition-all duration-300 outline-none resize-none" placeholder="Tell them one quirky thing about yourself..." rows="3"></textarea>
</div>
</div>
</form>
<!-- Decorative Illustration Card (Asymmetric) -->
<div class="mt-8 bg-surface-container-lowest p-8 rounded-xl shadow-[0_24px_48px_rgba(42,52,57,0.06)] flex items-center gap-6 overflow-hidden relative">
<div class="flex-1 space-y-2 relative z-10">
<p class="text-xs font-bold text-primary tracking-widest uppercase">Sneak Peek</p>
<p class="text-on-surface text-lg font-medium leading-tight">Your card will be soft, misty, and inviting.</p>
</div>
<div class="w-24 h-24 bg-primary-container/40 rounded-full blur-2xl absolute -right-4 -bottom-4"></div>
<div class="w-16 h-16 rounded-xl overflow-hidden flex-shrink-0 relative z-10 rotate-3">
<img alt="Minimalist desk" class="w-full h-full object-cover" data-alt="Close-up of a minimalist clean ceramic vase with a single dried flower on a soft blue linen background in natural light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCDnwgLL3v6Hr-nR9eCUUUxI1mM7uo95b8fCSzJiBBm4VRkUkGqnI3KmXErFh2EagzXmMUsrdWSYRjqPKvzcKExmWmis_NJQ1vQ8-Z3ufRHYj4eHAbLmTAkCxnFnfDN9t3Y0P60x13nYDtCvvfowzBEZKWNrxG5DRNQ9pT5xIl51mBfU-PmI8ygybt4RL0IJdC1HCZ1ONOlry2rBdC2RFPInzuLJ_KjDxdWgseEWkN0O4oVsjEQOe4E1VA_yothgKSDefgyWRoIjJs"/>
</div>
</div>
</main>
<!-- Fixed Bottom Action & Navigation (Combined Shell Logic) -->
<div class="fixed bottom-0 left-0 w-full z-50">
<!-- Floating FAB Action (Suppressed for focused form, but CTA needed here per instructions) -->
<div class="max-w-md mx-auto px-6 mb-24">
<button class="w-full bg-primary text-on-primary py-5 rounded-full text-lg font-semibold shadow-xl shadow-primary/20 hover:opacity-90 active:scale-95 transition-all duration-200">
                Generate Icebreaker Card
            </button>
</div>
<!-- Bottom Navigation Shell (JSON Defined) -->
<nav class="bg-[#f7f9fb]/80 dark:bg-slate-900/80 backdrop-blur-md shadow-[0_-4px_24px_rgba(42,52,57,0.04)] rounded-t-[3rem] w-full flex justify-around items-center px-8 pb-8 pt-4">
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 p-3 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors scale-98 active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="home_app_logo">home_app_logo</span>
</a>
<!-- Active State: Since we are in the "Icebreaker Tool" (main action), Chat/Icebreaker is logically related -->
<a class="flex flex-col items-center justify-center bg-[#cbe6ff] dark:bg-[#466178]/30 text-[#466178] dark:text-[#cbe6ff] rounded-full p-3 scale-98 active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="chat_bubble">chat_bubble</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 p-3 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors scale-98 active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
</a>
</nav>
</div>
</body></html>
