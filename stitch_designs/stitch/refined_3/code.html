<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>生成页 - 破冰卡生成器</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-surface-variant": "#566166",
              "surface-variant": "#d9e4ea",
              "tertiary-dim": "#4d545a",
              "tertiary-container": "#e0e6ee",
              "tertiary-fixed-dim": "#d2d8e0",
              "outline": "#717c82",
              "on-secondary-fixed-variant": "#4e5d6f",
              "error-container": "#fe8983",
              "on-error-container": "#752121",
              "on-primary": "#f3f8ff",
              "secondary-fixed": "#d4e4fa",
              "secondary-fixed-dim": "#c6d6ec",
              "on-tertiary-container": "#4e545b",
              "surface-container-lowest": "#ffffff",
              "background": "#f7f9fb",
              "primary-fixed": "#d3e4f6",
              "on-surface": "#2a3439",
              "secondary-container": "#d4e4fa",
              "error": "#9f403d",
              "on-secondary-container": "#445365",
              "inverse-primary": "#dcedff",
              "primary": "#50606f",
              "inverse-on-surface": "#9a9d9f",
              "on-tertiary-fixed-variant": "#585e65",
              "surface-container-high": "#e1e9ee",
              "secondary-dim": "#465467",
              "outline-variant": "#a9b4b9",
              "tertiary": "#596066",
              "on-primary-container": "#435462",
              "on-tertiary": "#f6f9ff",
              "tertiary-fixed": "#e0e6ee",
              "surface-container": "#e8eff3",
              "surface": "#f7f9fb",
              "error-dim": "#4e0309",
              "on-tertiary-fixed": "#3b4248",
              "surface-dim": "#cfdce3",
              "surface-tint": "#50606f",
              "secondary": "#526073",
              "primary-dim": "#445463",
              "surface-bright": "#f7f9fb",
              "on-primary-fixed-variant": "#4d5d6c",
              "on-secondary-fixed": "#324052",
              "inverse-surface": "#0b0f10",
              "surface-container-highest": "#d9e4ea",
              "surface-container-low": "#f0f4f7",
              "primary-container": "#d3e4f6",
              "on-primary-fixed": "#31414f",
              "on-error": "#fff7f6",
              "primary-fixed-dim": "#c5d6e8",
              "on-secondary": "#f7f9ff",
              "on-background": "#2a3439"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #d9e4ea;
            border-radius: 10px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#f7f9fb] dark:bg-slate-900 sticky top-0 z-50 transition-colors duration-200">
<div class="flex justify-between items-center w-full px-8 py-4">
<div class="flex items-center gap-4">
<button class="hover:bg-[#f0f4f7] dark:hover:bg-slate-800 transition-colors p-2 rounded-full scale-95 duration-200 ease-in-out">
<span class="material-symbols-outlined text-[#50606f] dark:text-[#b9cadb]" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-lg font-semibold text-[#50606f] dark:text-[#b9cadb] tracking-tight">Icebreakers</h1>
</div>
<div class="flex items-center space-x-6">
<span class="font-['Manrope'] font-medium tracking-tight text-[#50606f] hidden md:block">Create Card</span>
<span class="material-symbols-outlined text-[#50606f]" data-icon="more_vert">more_vert</span>
</div>
</div>
</header>
<main class="flex-grow flex flex-col items-center px-6 md:px-[8.5rem] py-12 space-y-16">
<!-- Hero Intro Section (Asymmetric Layout) -->
<section class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-12 gap-8 items-end">
<div class="md:col-span-7 space-y-4">
<h2 class="text-[2.5rem] font-medium leading-[1.2] tracking-tight text-primary">
                    建立你的<br/><span class="text-on-surface-variant font-normal">社交初印象</span>
</h2>
<p class="text-on-surface-variant text-lg max-w-sm">
                    填写简单的个人偏好，生成一张轻量、有趣的破冰卡片，让对话自然开启。
                </p>
</div>
<div class="md:col-span-5 hidden md:block">
<div class="h-48 w-full bg-surface-container-low rounded-xl relative overflow-hidden flex items-center justify-center">
<div class="absolute inset-0 bg-gradient-to-br from-primary/10 to-transparent"></div>
<span class="material-symbols-outlined text-primary/20 text-8xl" data-icon="cloud">cloud</span>
</div>
</div>
</section>
<!-- Form Canvas -->
<div class="w-full max-w-4xl space-y-24 pb-32">
<!-- Question 1: Name -->
<div class="space-y-6">
<div class="flex items-center gap-3">
<span class="w-8 h-[2px] bg-primary-container"></span>
<label class="text-sm font-semibold tracking-[0.05em] text-on-surface-variant uppercase">Name Identity</label>
</div>
<div class="group relative">
<h3 class="text-2xl font-medium mb-6">别人怎么称呼你</h3>
<input class="w-full bg-surface-container-lowest border-none rounded-lg p-6 text-xl focus:ring-2 focus:ring-primary-container transition-all outline-none placeholder:text-outline-variant/50 shadow-[0_4px_20px_rgba(0,0,0,0.02)]" placeholder="你的昵称或代号" type="text"/>
</div>
</div>
<!-- Question 2: Chat Style -->
<div class="space-y-6">
<div class="flex items-center gap-3">
<span class="w-8 h-[2px] bg-primary-container"></span>
<label class="text-sm font-semibold tracking-[0.05em] text-on-surface-variant uppercase">Communication Style</label>
</div>
<div class="space-y-6">
<h3 class="text-2xl font-medium">聊天风格</h3>
<div class="flex flex-wrap gap-3">
<button class="px-8 py-3 rounded-full bg-primary text-on-primary text-sm font-medium transition-transform active:scale-95">随缘</button>
<button class="px-8 py-3 rounded-full bg-surface-container-high text-on-surface text-sm font-medium hover:bg-surface-container-highest transition-all">话痨</button>
<button class="px-8 py-3 rounded-full bg-surface-container-high text-on-surface text-sm font-medium hover:bg-surface-container-highest transition-all">倾听者</button>
<button class="px-8 py-3 rounded-full bg-surface-container-high text-on-surface text-sm font-medium hover:bg-surface-container-highest transition-all">表情包大户</button>
<button class="px-8 py-3 rounded-full bg-surface-container-high text-on-surface text-sm font-medium hover:bg-surface-container-highest transition-all">言简意赅</button>
</div>
</div>
</div>
<!-- Question 3: Response Rhythm -->
<div class="space-y-6">
<div class="flex items-center gap-3">
<span class="w-8 h-[2px] bg-primary-container"></span>
<label class="text-sm font-semibold tracking-[0.05em] text-on-surface-variant uppercase">Response Pace</label>
</div>
<div class="space-y-6">
<h3 class="text-2xl font-medium">回复节奏</h3>
<div class="flex flex-wrap gap-3">
<button class="px-8 py-3 rounded-full bg-surface-container-high text-on-surface text-sm font-medium hover:bg-surface-container-highest transition-all">秒回</button>
<button class="px-8 py-3 rounded-full bg-primary text-on-primary text-sm font-medium transition-transform active:scale-95">忙完回</button>
<button class="px-8 py-3 rounded-full bg-surface-container-high text-on-surface text-sm font-medium hover:bg-surface-container-highest transition-all">意念回复</button>
<button class="px-8 py-3 rounded-full bg-surface-container-high text-on-surface text-sm font-medium hover:bg-surface-container-highest transition-all">看心情回</button>
</div>
</div>
</div>
<!-- Question 4: Vibe Preference -->
<div class="space-y-6">
<div class="flex items-center gap-3">
<span class="w-8 h-[2px] bg-primary-container"></span>
<label class="text-sm font-semibold tracking-[0.05em] text-on-surface-variant uppercase">Social Vibe</label>
</div>
<div class="space-y-6">
<h3 class="text-2xl font-medium">相处偏好</h3>
<div class="flex flex-wrap gap-3">
<button class="px-8 py-3 rounded-full bg-surface-container-high text-on-surface text-sm font-medium hover:bg-surface-container-highest transition-all">慢热</button>
<button class="px-8 py-3 rounded-full bg-surface-container-high text-on-surface text-sm font-medium hover:bg-surface-container-highest transition-all">自来熟</button>
<button class="px-8 py-3 rounded-full bg-primary text-on-primary text-sm font-medium transition-transform active:scale-95">边界感</button>
<button class="px-8 py-3 rounded-full bg-surface-container-high text-on-surface text-sm font-medium hover:bg-surface-container-highest transition-all">直球型</button>
</div>
</div>
</div>
<!-- Question 5: Personal Note -->
<div class="space-y-6">
<div class="flex items-center gap-3">
<span class="w-8 h-[2px] bg-primary-container"></span>
<label class="text-sm font-semibold tracking-[0.05em] text-on-surface-variant uppercase">Personal Signature</label>
</div>
<div class="space-y-6">
<h3 class="text-2xl font-medium">一句备注</h3>
<textarea class="w-full bg-surface-container-lowest border-none rounded-lg p-6 text-lg focus:ring-2 focus:ring-primary-container transition-all outline-none placeholder:text-outline-variant/50 resize-none shadow-[0_4px_20px_rgba(0,0,0,0.02)]" placeholder="在这里写下你想对新朋友说的话..." rows="4"></textarea>
</div>
</div>
<!-- Final Action Section -->
<div class="pt-12 flex flex-col items-center space-y-8">
<div class="w-full h-px bg-surface-container-high"></div>
<div class="text-center space-y-4">
<p class="text-on-surface-variant text-sm font-medium">预览效果已准备就绪</p>
<button class="group relative px-12 py-5 rounded-full bg-gradient-to-br from-primary to-primary-dim text-on-primary text-lg font-semibold shadow-xl hover:shadow-primary/20 transition-all active:scale-95 overflow-hidden">
<span class="relative z-10">生成破冰卡</span>
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
</div>
</div>
</div>
</main>
<!-- BottomNavBar (Hidden on desktop, active on Profile if applicable) -->
<nav class="md:hidden fixed bottom-6 left-0 right-0 mx-auto w-[92%] max-w-md z-50 flex justify-around items-center p-2 bg-[#ffffffcc] dark:bg-slate-900/80 backdrop-blur-xl rounded-[48px] shadow-[0_12px_40px_rgba(0,0,0,0.04)]">
<a class="flex flex-col items-center justify-center text-[#566166] px-6 py-2 hover:text-[#50606f] transition-all" href="#">
<span class="material-symbols-outlined mb-1" data-icon="auto_awesome">auto_awesome</span>
<span class="font-['Manrope'] text-[12px] font-medium tracking-wide">Discover</span>
</a>
<a class="flex flex-col items-center justify-center text-[#566166] px-6 py-2 hover:text-[#50606f] transition-all" href="#">
<span class="material-symbols-outlined mb-1" data-icon="bookmark">bookmark</span>
<span class="font-['Manrope'] text-[12px] font-medium tracking-wide">Saved</span>
</a>
<a class="flex flex-col items-center justify-center bg-[#50606f] text-white rounded-full px-6 py-2 transition-transform active:scale-90" href="#">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-['Manrope'] text-[12px] font-medium tracking-wide">Profile</span>
</a>
</nav>
<!-- Ambient Visual Decoration (Ethereal Elements) -->
<div class="fixed top-[20%] right-[-5%] w-96 h-96 bg-primary/5 rounded-full blur-[120px] pointer-events-none -z-10"></div>
<div class="fixed bottom-[10%] left-[-5%] w-72 h-72 bg-secondary-container/20 rounded-full blur-[100px] pointer-events-none -z-10"></div>
</body></html>
